services:
  - type: worker
    name: aether-arena-discord-bot
    runtime: node
    plan: free
    buildCommand: cd mini-services/discord-bot && npm install && npm run build
    startCommand: cd mini-services/discord-bot && npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ID
        value: "1493661620239601664"
      - key: BASE_URL
        value: "https://aether-arena.vercel.app"
