name: Aether Arena Discord Bot

on:
  push:
    branches: [main]
    paths:
      - 'mini-services/discord-bot/**'
      - '.github/workflows/discord-bot.yml'
  workflow_dispatch:
  schedule:
    # Auto-restart every 5 hours to stay within 6-hour timeout
    # Runs at minute 0 of hours 0, 5, 10, 15, 20 UTC
    - cron: '0 0,5,10,15,20 * * *'

concurrency:
  group: discord-bot-runner
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd mini-services/discord-bot && bun install

      - name: Generate Prisma Client
        run: cd mini-services/discord-bot && npx prisma@6 generate

      - name: Start Discord Bot
        run: cd mini-services/discord-bot && bun run start
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID || '1493661620239601664' }}
          BASE_URL: ${{ secrets.BASE_URL || 'https://aether-arena.vercel.app' }}
